<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>수영아</title>
<meta name="description" content="수영을 위한 페이지." />
<meta name="theme-color" content="#fdf6ed" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=Gowun+Batang:wght@400;700&family=Caveat:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:    #fdf6ed;     /* warm off-white */
    --paper-2:  #f6ecd9;     /* deeper cream */
    --ink:      #2a1d18;     /* warm dark brown */
    --ink-soft: #8a7568;
    --rose:     #c97a6e;     /* dusty rose */
    --peach:    #f4a787;
    --gold:     #c9a35b;
    --line:     rgba(42, 29, 24, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Gowun Batang', 'Fraunces', serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(244, 167, 135, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(201, 122, 110, 0.12) 0%, transparent 50%),
      var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    line-height: 1.7;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(42, 29, 24, 0.025) 1px, transparent 1px);
    background-size: 4px 4px;
    pointer-events: none;
    z-index: 1;
  }

  /* Floating petals */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    color: var(--rose);
    font-size: 16px;
    opacity: 0.45;
    will-change: transform;
  }

  /* Stage */
  .stage {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  /* Top label */
  .label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(-8px);
    animation: rise 1s 0.4s ease forwards;
  }

  /* Hero greeting */
  .greeting {
    font-family: 'Gowun Batang', serif;
    font-weight: 400;
    font-size: clamp(40px, 9vw, 96px);
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .greeting .char {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 0.9s ease forwards;
  }
  .greeting .accent {
    color: var(--rose);
    font-style: italic;
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-weight: 500;
  }

  .sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(18px, 2.6vw, 26px);
    color: var(--ink-soft);
    margin-top: 16px;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1s 1.6s ease forwards;
  }

  /* Hand-written line */
  .hand {
    font-family: 'Caveat', cursive;
    font-size: clamp(28px, 4.5vw, 44px);
    color: var(--rose);
    margin-top: 64px;
    opacity: 0;
    transform: translateY(8px) rotate(-2deg);
    animation: rise 1s 2.2s ease forwards;
    transform-origin: center;
  }

  /* Heart pulse */
  .heart {
    margin-top: 72px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: 0 4px 16px rgba(42, 29, 24, 0.08), 0 12px 32px rgba(244, 167, 135, 0.18);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    animation: rise 1s 2.8s ease forwards, heartbeat 2.4s 4s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
  }
  .heart:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(244, 167, 135, 0.4); }
  .heart:active { transform: scale(0.92); }
  .heart svg { width: 28px; height: 28px; fill: var(--rose); }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    20% { transform: scale(1.06); }
    35% { transform: scale(1); }
    50% { transform: scale(1.08); }
    65% { transform: scale(1); }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--ink-soft);
    text-transform: uppercase;
    opacity: 0.6;
    z-index: 4;
  }

  /* Note that appears on heart click */
  .note {
    position: fixed;
    inset: 0;
    background: rgba(253, 246, 237, 0.96);
    backdrop-filter: blur(12px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    padding: 32px;
    text-align: center;
  }
  .note.open { display: flex; animation: fade 0.6s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .note .text {
    font-family: 'Caveat', 'Gowun Batang', cursive;
    font-size: clamp(28px, 5vw, 48px);
    color: var(--ink);
    line-height: 1.6;
    max-width: 540px;
  }
  .note .text em { color: var(--rose); font-style: italic; }
  .note .close {
    margin-top: 32px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-soft);
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--line);
    padding: 10px 22px;
  }
  .note .close:hover { border-color: var(--rose); color: var(--rose); }

  @media (max-width: 768px) {
    .stage { padding: 32px 18px; }
    .label { margin-bottom: 24px; font-size: 9px; }
    .hand { margin-top: 48px; }
    .heart { margin-top: 56px; width: 56px; height: 56px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .greeting .char, .sub, .label, .hand, .heart {
      opacity: 1; transform: none; animation: none;
    }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="label">— for sy —</div>

  <h1 class="greeting" id="greeting">
    <!-- chars filled by JS -->
  </h1>

  <p class="sub">널 위한 페이지야.</p>

  <div class="hand">— always &nbsp;♡</div>

  <button class="heart" id="heart" aria-label="open">
    <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9.5-9.5C0.5 7 4 3 8 3c2 0 3 1 4 2.5C13 4 14 3 16 3c4 0 7.5 4 5.5 8.5C19 16.65 12 21 12 21z"/></svg>
  </button>
</div>

<footer>SYSIDE · 2026</footer>

<div class="note" id="note">
  <div class="text">
    <em>수영아.</em><br/>
    이 작은 자리는 너만을 위한 곳이야.<br/>
    가끔 들러서, 따뜻하게 머물다 가.
  </div>
  <button class="close">close</button>
</div>

<script>
  /* Stagger characters of greeting */
  const greeting = document.getElementById('greeting');
  const text = '수영아,';
  [...text].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'char' + (ch === ',' ? '' : '');
    span.textContent = ch;
    span.style.animationDelay = (0.6 + i * 0.12) + 's';
    if (ch === '수' || ch === '영') span.classList.add('accent');
    greeting.appendChild(span);
  });

  /* Heart click → reveal note */
  const heart = document.getElementById('heart');
  const note = document.getElementById('note');
  heart.addEventListener('click', () => {
    note.classList.add('open');
    if (navigator.vibrate) navigator.vibrate(15);
  });
  note.querySelector('.close').addEventListener('click', () => {
    note.classList.remove('open');
  });
  note.addEventListener('click', (e) => {
    if (e.target === note) note.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') note.classList.remove('open');
  });

  /* Floating petals */
  const petalChars = ['❀', '✿', '✦', '·'];
  function spawnPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
    const startX = Math.random() * window.innerWidth;
    const size = 12 + Math.random() * 14;
    const duration = 9 + Math.random() * 8;
    const drift = (Math.random() - 0.5) * 200;
    const rotation = (Math.random() - 0.5) * 720;
    petal.style.left = startX + 'px';
    petal.style.top = '-30px';
    petal.style.fontSize = size + 'px';
    petal.style.color = ['#c97a6e', '#f4a787', '#c9a35b'][Math.floor(Math.random() * 3)];
    petal.style.opacity = 0.3 + Math.random() * 0.3;
    petal.animate([
      { transform: 'translate(0, 0) rotate(0deg)' },
      { transform: `translate(${drift}px, ${window.innerHeight + 60}px) rotate(${rotation}deg)` }
    ], {
      duration: duration * 1000,
      easing: 'linear'
    });
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), duration * 1000);
  }
  // spawn petals at gentle pace
  setInterval(spawnPetal, 1200);
  // initial sprinkle
  for (let i = 0; i < 4; i++) {
    setTimeout(spawnPetal, i * 800);
  }
</script>
</body>
</html>
