# Single source of truth for the menherabot chart.
# CI bumps `web.image.tag` (and later `api.image.tag`) directly in this file.

namespace: menherabot # informational; ArgoCD creates if needed
global:
  domain: menherabot.hcdev.shop
  imagePullSecrets: [] # add { name: ghcr-secret } if private images
# ========== Web (frontend) ==========
web:
  enabled: true
  image:
    repository: ghcr.io/hongchal/menherabot-web
    tag: sha-99fe32a # ⬅ CI overwrites this line via yq on every push to main
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 3000 # Next.js standalone listens on PORT=3000
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 15
      periodSeconds: 30
# ========== API (backend, Go) ==========
api:
  enabled: true
  image:
    repository: ghcr.io/hongchal/menherabot-api
    tag: sha-6520859 # CI overwrites via yq on every push to main affecting apps/api/**
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 300m
      memory: 128Mi
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 2
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 30
  # Postgres host injected as plain env; user/password/db come from secret.
  env:
    POSTGRES_HOST: menherabot-postgres
    POSTGRES_PORT: "5432"
# ========== Postgres (database) ==========
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    # ⚠️ Dev defaults — rotate in production via:
    #    kubectl -n menherabot patch secret menherabot-postgres-auth --type=merge \
    #      -p '{"stringData":{"POSTGRES_PASSWORD":"<new>"}}'
    username: menherabot
    password: change-me-in-prod
    database: menherabot
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClass: "" # "" → cluster default (k3s default = local-path)
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
# ========== Ingress ==========
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  tls: true
