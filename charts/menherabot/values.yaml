# Default values for menherabot chart.
# Production overrides live in values-prod.yaml (image tag bumped by CI).

namespace: menherabot           # informational; ArgoCD creates if needed

global:
  domain: menherabot.hcdev.shop
  imagePullSecrets: []      # add { name: ghcr-secret } if private images

# ========== Web (frontend) ==========
web:
  enabled: true
  image:
    repository: ghcr.io/hongchal/menherabot-web
    tag: main               # CI overrides this in values-prod.yaml with sha-XXXXXXX
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 80
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 2
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 30

# ========== API (backend) — disabled until added ==========
api:
  enabled: false
  image:
    repository: ghcr.io/hongchal/menherabot-api
    tag: main
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 3000
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ========== Ingress ==========
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  tls: true
