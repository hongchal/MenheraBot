{{- if .Values.web.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "menherabot.web.fullname" . }}-env
  labels:
    {{- include "menherabot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
stringData:
  {{- if .Values.web.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .Values.web.deepseekApiKey | quote }}
  {{- end }}
  {{- if .Values.web.databaseUrl }}
  DATABASE_URL: {{ .Values.web.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.web.googleSheetId }}
  GOOGLE_SHEET_ID: {{ .Values.web.googleSheetId | quote }}
  {{- end }}
  {{- if .Values.web.googleServiceAccountJson }}
  GOOGLE_SERVICE_ACCOUNT_JSON: {{ .Values.web.googleServiceAccountJson | quote }}
  {{- end }}
{{- end }}
