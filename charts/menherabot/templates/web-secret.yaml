{{- if and .Values.web.enabled .Values.web.geminiApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "menherabot.web.fullname" . }}-env
  labels:
    {{- include "menherabot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
stringData:
  GEMINI_API_KEY: {{ .Values.web.geminiApiKey | quote }}
{{- end }}
