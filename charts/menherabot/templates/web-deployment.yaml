{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "menherabot.web.fullname" . }}
  labels:
    {{- include "menherabot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.web.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.web.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.web.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.web.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.probes.liveness.periodSeconds }}
          # The `-env` secret carries DEEPSEEK_API_KEY. In prod it is managed
          # directly as a k8s Secret (kubectl), not via git, so the key never
          # lands in the repo; for local dev it can still be rendered from
          # .Values.web.deepseekApiKey (web-secret.yaml).
          #   kubectl -n menherabot create secret generic menherabot-web-env \
          #     --from-literal=DEEPSEEK_API_KEY=<key> --dry-run=client -o yaml \
          #     | kubectl apply -f -
          # ArgoCD does not manage this secret (not in chart) → no prune.
          # optional:true → pod starts even if the secret is not present yet.
          envFrom:
            - secretRef:
                name: {{ include "menherabot.web.fullname" . }}-env
                optional: true
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
{{- end }}
