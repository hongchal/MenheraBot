apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: menherabot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/hongchal/MenheraBot.git
    targetRevision: main
    path: charts/menherabot
    helm:
      releaseName: menherabot
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: menherabot
  syncPolicy:
    automated:
      prune: true        # 매니페스트에서 제거된 리소스 자동 삭제
      selfHeal: true     # 클러스터에서 수동 변경된 리소스 자동 복원
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
