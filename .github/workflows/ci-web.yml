name: CI · web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'charts/menherabot/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 매니페스트 자동 커밋용
      packages: write     # ghcr 푸시용
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: meta
        run: echo "sha=$(echo ${{ github.sha }} | head -c7)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/hongchal/menherabot-web:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/hongchal/menherabot-web:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in values-prod.yaml
        run: |
          NEW_TAG="sha-${{ steps.meta.outputs.sha }}"
          yq -i ".web.image.tag = \"${NEW_TAG}\"" charts/menherabot/values-prod.yaml
          echo "--- updated values-prod.yaml ---"
          cat charts/menherabot/values-prod.yaml

      - name: Commit & push manifest update
        run: |
          if git diff --quiet charts/menherabot/values-prod.yaml; then
            echo "no manifest change"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/menherabot/values-prod.yaml
          git commit -m "chore(web): bump image to sha-${{ steps.meta.outputs.sha }} [skip ci]"
          git push
