name: CI · web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'charts/menherabot/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bot 브랜치 push
      packages: write          # ghcr push
      pull-requests: write     # gh pr create / merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: meta
        run: echo "sha=$(echo ${{ github.sha }} | head -c7)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/hongchal/menherabot-web:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/hongchal/menherabot-web:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Lint & template Helm chart
        run: |
          helm lint charts/menherabot
          helm template menherabot charts/menherabot > /dev/null

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in values.yaml
        id: bump
        run: |
          NEW_TAG="sha-${{ steps.meta.outputs.sha }}"
          yq -i ".web.image.tag = \"${NEW_TAG}\"" charts/menherabot/values.yaml
          if git diff --quiet charts/menherabot/values.yaml; then
            echo "values.yaml already at ${NEW_TAG}, skipping PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # main 직접 push는 ruleset이 막으므로 PR을 거쳐 자동 머지.
      # PR 제목에 [skip ci]를 넣어 squash 후 ci-web 무한 재트리거 방지.
      - name: Open auto-merge PR for manifest bump
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="bot/web-bump-${{ steps.meta.outputs.sha }}"
          TITLE="chore(web): bump image to sha-${{ steps.meta.outputs.sha }} [skip ci]"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add charts/menherabot/values.yaml
          git commit -m "$TITLE"
          git push -u origin "$BR"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BR" \
            --title "$TITLE" \
            --body "Automated image tag bump from ci-web.yml run #${{ github.run_id }}.")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash --delete-branch
