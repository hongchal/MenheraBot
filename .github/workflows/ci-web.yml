name: CI · web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'charts/menherabot/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # bot 브랜치 push
      packages: write          # ghcr push
      pull-requests: write     # gh pr create / merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: meta
        run: echo "sha=$(echo ${{ github.sha }} | head -c7)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/hongchal/menherabot-web:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/hongchal/menherabot-web:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Lint & template Helm chart
        run: |
          helm lint charts/menherabot
          helm template menherabot charts/menherabot > /dev/null

      # DEEPSEEK_API_KEY is injected into the cluster out-of-band (never in git).
      # Uses the restricted `gha-deployer` kubeconfig (secrets + named-deploy
      # patch only, in the menherabot namespace).
      - name: Sync DEEPSEEK_API_KEY secret to cluster
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ] || [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::KUBE_CONFIG_DATA or DEEPSEEK_API_KEY missing — skipping secret sync"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl -n menherabot create secret generic menherabot-web-env \
            --from-literal=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          # Roll web pods so a rotated key takes effect even without an image bump.
          kubectl -n menherabot rollout restart deploy/menherabot-web || true

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in values.yaml
        id: bump
        run: |
          NEW_TAG="sha-${{ steps.meta.outputs.sha }}"
          yq -i ".web.image.tag = \"${NEW_TAG}\"" charts/menherabot/values.yaml
          if git diff --quiet charts/menherabot/values.yaml; then
            echo "values.yaml already at ${NEW_TAG}, skipping PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # main 직접 push는 ruleset이 막으므로 PR을 거쳐 자동 머지.
      # PR 제목에 [skip ci]를 넣어 squash 후 ci-web 무한 재트리거 방지.
      - name: Open auto-merge PR for manifest bump
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="bot/web-bump-${{ steps.meta.outputs.sha }}"
          TITLE="chore(web): bump image to sha-${{ steps.meta.outputs.sha }} [skip ci]"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add charts/menherabot/values.yaml
          git commit -m "$TITLE"
          git push -u origin "$BR"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BR" \
            --title "$TITLE" \
            --body "Automated image tag bump from ci-web.yml run #${{ github.run_id }}.")
          echo "Created PR: $PR_URL"
          # `--auto` errors with "clean status" when no required checks gate the
          # PR, so fall back to a direct merge in that case.
          gh pr merge "$PR_URL" --auto --squash --delete-branch \
            || gh pr merge "$PR_URL" --squash --delete-branch
